<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="sky-sh" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="60%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#e5e7eb"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#sky-sh)" rx="8"/>
  <!-- Ground -->
  <rect x="0" y="340" width="800" height="110" fill="#d1d5db" rx="0"/>
  <!-- Oriental Pearl Tower silhouette -->
  <rect x="350" y="120" width="8" height="220" fill="#6b7280"/>
  <circle cx="354" cy="180" r="25" fill="#6b7280"/>
  <circle cx="354" cy="250" r="15" fill="#6b7280"/>
  <rect x="348" y="100" width="12" height="30" fill="#6b7280" rx="2"/>
  <!-- Tall buildings -->
  <rect x="140" y="160" width="50" height="180" fill="#4b5563" rx="3"/>
  <rect x="148" y="168" width="8" height="8" fill="#93c5fd" rx="1"/>
  <rect x="164" y="168" width="8" height="8" fill="#93c5fd" rx="1"/>
  <rect x="148" y="184" width="8" height="8" fill="#93c5fd" rx="1"/>
  <rect x="164" y="184" width="8" height="8" fill="#93c5fd" rx="1"/>
  <rect x="200" y="190" width="45" height="150" fill="#374151" rx="3"/>
  <rect x="260" y="170" width="40" height="170" fill="#4b5563" rx="3"/>
  <rect x="420" y="200" width="55" height="140" fill="#374151" rx="3"/>
  <rect x="490" y="180" width="40" height="160" fill="#4b5563" rx="3"/>
  <rect x="550" y="210" width="50" height="130" fill="#374151" rx="3"/>
  <rect x="620" y="230" width="45" height="110" fill="#4b5563" rx="3"/>
  <!-- Windows on buildings -->
  <rect x="430" y="210" width="8" height="6" fill="#93c5fd" rx="1"/>
  <rect x="450" y="210" width="8" height="6" fill="#93c5fd" rx="1"/>
  <rect x="430" y="225" width="8" height="6" fill="#93c5fd" rx="1"/>
  <rect x="450" y="225" width="8" height="6" fill="#93c5fd" rx="1"/>
  <!-- River -->
  <rect x="0" y="320" width="800" height="25" fill="#60a5fa" opacity="0.4"/>
  <!-- Office pin -->
  <circle cx="500" cy="280" r="10" fill="#d4a853" stroke="#ffffff" stroke-width="2"/>
  <text x="500" y="284" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#ffffff">&#9733;</text>
  <!-- Title -->
  <text x="400" y="390" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#1e40af">上海办公室</text>
  <text x="400" y="415" text-anchor="middle" font-family="Arial, sans-serif" font-size="14" fill="#4b5563">Shanghai Office</text>
  <text x="785" y="443" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="rgba(0,0,0,0.15)" font-weight="bold">MOCK</text>
</svg>