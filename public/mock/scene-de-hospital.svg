<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <rect width="800" height="450" fill="#ecfdf5" rx="8"/>
  <!-- Hospital bed -->
  <rect x="280" y="200" width="180" height="80" fill="#d1d5db" rx="4"/>
  <rect x="270" y="195" width="200" height="10" fill="#9ca3af" rx="2"/>
  <rect x="270" y="280" width="10" height="20" fill="#6b7280" rx="1"/>
  <rect x="460" y="280" width="10" height="20" fill="#6b7280" rx="1"/>
  <!-- Pillow -->
  <rect x="290" y="210" width="50" height="30" fill="#ffffff" rx="8"/>
  <!-- Patient silhouette -->
  <circle cx="315" cy="220" r="12" fill="#9ca3af"/>
  <rect x="330" y="220" width="100" height="15" fill="#9ca3af" rx="3"/>
  <!-- Nurse figure -->
  <circle cx="520" cy="180" r="20" fill="#1e40af"/>
  <rect x="508" y="200" width="24" height="45" fill="#1e40af" rx="4"/>
  <!-- Clipboard -->
  <rect x="540" y="210" width="18" height="25" fill="#d4a853" rx="2"/>
  <!-- Medical cross -->
  <rect x="180" y="80" width="40" height="40" fill="#ffffff" rx="4" stroke="#1e40af" stroke-width="2"/>
  <rect x="194" y="88" width="12" height="24" fill="#1e40af" rx="1"/>
  <rect x="188" y="94" width="24" height="12" fill="#1e40af" rx="1"/>
  <!-- IV stand -->
  <line x1="580" y1="100" x2="580" y2="260" stroke="#6b7280" stroke-width="3"/>
  <rect x="570" y="95" width="20" height="25" fill="#93c5fd" rx="3"/>
  <line x1="575" y1="260" x2="585" y2="260" stroke="#6b7280" stroke-width="3"/>
  <!-- Title -->
  <text x="400" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#059669">德国医院工作场景</text>
  <text x="785" y="443" text-anchor="end" font-family="Arial, sans-serif" font-size="10" fill="rgba(0,0,0,0.15)" font-weight="bold">MOCK</text>
</svg>